<title>BPC Personal Care — WoW Sales Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0e17;
  --surface: #111827;
  --surface2: #1a2234;
  --border: #1e293b;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --accent: #6366f1;
  --accent2: #818cf8;
  --hrd: #f43f5e;
  --hrd-bg: rgba(244,63,94,0.12);
  --small-event: #f59e0b;
  --small-event-bg: rgba(245,158,11,0.12);
  --bau: #22c55e;
  --bau-bg: rgba(34,197,94,0.10);
  --up: #10b981;
  --down: #ef4444;
  --font: 'DM Sans', sans-serif;
  --mono: 'Space Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

.header {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #0a0e17 0%, #111827 100%);
}
.header h1 {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e2e8f0, #6366f1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header .subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }

.controls {
  display: flex; gap: 12px; padding: 16px 32px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); background: var(--surface);
}
.ctrl-group { display: flex; flex-direction: column; gap: 4px; }
.ctrl-group label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); font-weight: 500; }
.ctrl-group select {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 12px; border-radius: 6px; font-family: var(--font); font-size: 13px;
  min-width: 200px; cursor: pointer; outline: none;
}
.ctrl-group select:focus { border-color: var(--accent); }

.kpi-strip {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; padding: 20px 32px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 18px; position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent);
}
.kpi-card.up::before { background: var(--up); }
.kpi-card.down::before { background: var(--down); }
.kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 6px; }
.kpi-value { font-family: var(--mono); font-size: 20px; font-weight: 700; }
.kpi-delta { font-size: 12px; font-family: var(--mono); margin-top: 4px; }
.kpi-delta.up { color: var(--up); }
.kpi-delta.down { color: var(--down); }

.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 32px 24px;
}
.chart-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; overflow: hidden;
}
.chart-card.full { grid-column: 1 / -1; }
.canvas-wrap { position: relative; height: 280px; width: 100%; }
.chart-title {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text2); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.chart-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

.event-strip {
  display: flex; gap: 4px; padding: 8px 32px 4px; flex-wrap: wrap;
}
.event-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 4px;
  font-family: var(--mono); font-weight: 400;
}
.event-tag.HRD { background: var(--hrd-bg); color: var(--hrd); }
.event-tag.BAU { background: var(--bau-bg); color: var(--bau); }
.event-tag.small { background: var(--small-event-bg); color: var(--small-event); }

.legend-strip {
  display: flex; gap: 16px; padding: 4px 32px 12px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.trend-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.trend-table th {
  text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2);
  font-weight: 500; position: sticky; top: 0; background: var(--surface);
}
.trend-table td {
  padding: 7px 10px; border-bottom: 1px solid rgba(30,41,59,0.5);
  font-family: var(--mono); font-size: 11px;
}
.trend-table tr:hover td { background: var(--surface2); }
.trend-table .flag-cell { font-weight: 700; }
.trend-table .flag-cell.HRD { color: var(--hrd); }
.trend-table .flag-cell.BAU { color: var(--bau); }
.trend-table .flag-cell.Small { color: var(--small-event); }

.table-wrap { max-height: 400px; overflow-y: auto; border-radius: 8px; }
.table-wrap::-webkit-scrollbar { width: 6px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.section-title {
  font-size: 15px; font-weight: 700; padding: 20px 32px 8px;
  color: var(--text); letter-spacing: -0.3px;
}

@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr; }
  .controls { padding: 12px 16px; }
  .kpi-strip { padding: 12px 16px; }
  .charts-grid { padding: 0 16px 16px; }
  .header { padding: 20px 16px 14px; }
}
</style>
</head>

function getBarColors(data) {
  return data.map(d => {
    if (d.flag === 'HRD') return 'rgba(244,63,94,0.7)';
    if (d.flag === 'Small Event') return 'rgba(245,158,11,0.6)';
    return 'rgba(99,102,241,0.5)';
  });
}

function getBarBorders(data) {
  return data.map(d => {
    if (d.flag === 'HRD') return '#f43f5e';
    if (d.flag === 'Small Event') return '#f59e0b';
    return '#6366f1';
  });
}

function trendLine(values) {
  const n = values.length;
  if (n < 2) return { slope: 0, dir: 'flat' };
  const xs = values.map((_, i) => i);
  const xm = xs.reduce((a, b) => a + b, 0) / n;
  const ym = values.reduce((a, b) => a + b, 0) / n;
  let num = 0, den = 0;
  for (let i = 0; i < n; i++) {
    num += (xs[i] - xm) * (values[i] - ym);
    den += (xs[i] - xm) ** 2;
  }
  const slope = den ? num / den : 0;
  return { slope, dir: slope > 0 ? 'up' : slope < 0 ? 'down' : 'flat' };
}

function fmtNum(n) {
  if (n >= 1e7) return '₹' + (n / 1e7).toFixed(1) + ' Cr';
  if (n >= 1e5) return '₹' + (n / 1e5).toFixed(1) + ' L';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString('en-IN');
}

function fmtDrr(n) {
  if (n >= 1e5) return (n / 1e5).toFixed(1) + 'L';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString('en-IN');
}

function pctChange(curr, prev) {
  if (!prev) return { val: 0, str: '—' };
  const pct = ((curr - prev) / prev * 100);
  const sign = pct >= 0 ? '+' : '';
  return { val: pct, str: sign + pct.toFixed(1) + '%' };
}

  const bauWeeks = data.filter(d => d.flag === 'BAU');
  const bauTrend = trendLine(bauWeeks.map(d => d.unit_drr));

  const gmvChg = pctChange(last.gmv_drr, prev.gmv_drr);
  const aspChg = pctChange(last.asp, prev.asp);

    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: label,
          data: values,
          backgroundColor: bgColors,
          borderColor: borderColors,
          borderWidth: 1,
          borderRadius: 4,
          barPercentage: 0.7,
        },
        {
          type: 'line',
          label: 'Trend',
          data: trendData,
          borderColor: '#e2e8f0',
          borderWidth: 1.5,
          borderDash: [6, 3],
          pointRadius: 0,
          fill: false,
          tension: 0,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2234',
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          borderColor: '#1e293b',
          borderWidth: 1,
          padding: 10,
          bodyFont: { family: 'Space Mono', size: 11 },
          callbacks: {
            label: function(ctx) {
              if (ctx.datasetIndex === 1) return 'Trend: ' + (isCurrency ? fmtNum(Math.round(ctx.raw)) : fmtDrr(Math.round(ctx.raw)));
              const d = data[ctx.dataIndex];
              const val = isCurrency ? fmtNum(ctx.raw) : fmtDrr(ctx.raw);
              return [val, d.events || d.flag || ''].filter(Boolean);
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(30,41,59,0.5)' },
          ticks: { color: '#94a3b8', font: { family: 'Space Mono', size: 10 } }
        },
        y: {
          grid: { color: 'rgba(30,41,59,0.3)' },
          ticks: {
            color: '#94a3b8',
            font: { family: 'Space Mono', size: 10 },
            callback: function(v) { return isCurrency ? fmtNum(v) : fmtDrr(v); }
          }
        }
      }
    }
  });
}

function makeAspChart(canvas, data) {
  const ctx = canvas.getContext('2d');
  const labels = data.map(d => d.label);
  const values = data.map(d => d.asp);
  const bgColors = data.map(d => {
    if (d.flag === 'HRD') return 'rgba(244,63,94,0.8)';
    if (d.flag === 'Small Event') return 'rgba(245,158,11,0.7)';
    return 'rgba(16,185,129,0.6)';
  });
  
  const trend = trendLine(values);
  const n = values.length;
  const xs = values.map((_, i) => i);
  const xm = xs.reduce((a, b) => a + b, 0) / n;
  const ym = values.reduce((a, b) => a + b, 0) / n;
  let num2 = 0, den2 = 0;
  for (let i = 0; i < n; i++) { num2 += (xs[i] - xm) * (values[i] - ym); den2 += (xs[i] - xm) ** 2; }
  const slope = den2 ? num2 / den2 : 0;
  const intercept = ym - slope * xm;
  const trendData = xs.map(x => slope * x + intercept);
  
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'ASP',
          data: values,
          borderColor: '#10b981',
          backgroundColor: 'rgba(16,185,129,0.1)',
          borderWidth: 2,
          pointBackgroundColor: bgColors,
          pointBorderColor: bgColors,
          pointRadius: 5,
          pointHoverRadius: 7,
          fill: true,
          tension: 0.3,
        },
        {
          label: 'Trend',
          data: trendData,
          borderColor: '#e2e8f0',
          borderWidth: 1.5,
          borderDash: [6, 3],
          pointRadius: 0,
          fill: false,
          tension: 0,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2234',
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          borderColor: '#1e293b',
          borderWidth: 1,
          padding: 10,
          bodyFont: { family: 'Space Mono', size: 11 },
          callbacks: {
            label: function(ctx) {
              if (ctx.datasetIndex === 1) return 'Trend: ₹' + Math.round(ctx.raw);
              return '₹' + ctx.raw;
            }
          }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(30,41,59,0.5)' }, ticks: { color: '#94a3b8', font: { family: 'Space Mono', size: 10 } } },
        y: {
          grid: { color: 'rgba(30,41,59,0.3)' },
          ticks: { color: '#94a3b8', font: { family: 'Space Mono', size: 10 }, callback: v => '₹' + v }
        }
      }
    }
  });
}

function renderTable(data) {
  const wrap = document.getElementById('tableWrap');
  let html = '<table class="trend-table"><thead><tr>';
  html += '<th>Week</th><th>Flag</th><th>Events</th><th>Units</th><th>GMV (₹)</th><th>Unit DRR</th><th>GMV DRR</th><th>ASP (₹)</th><th>Days</th>';
  html += '</tr></thead><tbody>';
  
  data.forEach((d, i) => {
    const flagClass = d.flag === 'HRD' ? 'HRD' : d.flag === 'Small Event' ? 'Small' : 'BAU';
    const unitChg = i > 0 ? pctChange(d.unit_drr, data[i-1].unit_drr) : { str: '—', val: 0 };
    html += `<tr>
      <td style="font-weight:700">${d.label}</td>
      <td class="flag-cell ${flagClass}">${d.flag || '—'}</td>
      <td style="font-family:var(--font);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.events || ''}">${d.events || '—'}</td>
      <td>${d.qty ? d.qty.toLocaleString('en-IN') : '—'}</td>
      <td>${d.rev ? fmtNum(d.rev) : '—'}</td>
      <td>${fmtDrr(d.unit_drr)}</td>
      <td>${fmtNum(d.gmv_drr)}</td>
      <td>₹${d.asp}</td>
      <td>${d.days || 7}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function getData() {
  const level = document.getElementById('levelSelect').value;
  const filter = document.getElementById('filterSelect').value;
  
  if (level === 'overall') return DATA.overall;
  if (level === 'brand') return DATA.brands[filter] || [];
  if (level === 'articleType') return DATA.articleTypes[filter] || [];
  if (level === 'combo') return DATA.combos[filter] || [];
  return [];
}

function enrichData(arr) {
  // Add event info from overall data for non-overall views
  const overallMap = {};
  DATA.overall.forEach(d => { overallMap[d.week] = d; });
  return arr.map(d => ({
    ...d,
    flag: d.flag || (overallMap[d.week] ? overallMap[d.week].flag : 'BAU'),
    events: d.events || (overallMap[d.week] ? overallMap[d.week].events : ''),
    days: d.days || (overallMap[d.week] ? overallMap[d.week].days : 7),
  }));
}

function updateDashboard() {
  let data = getData();
  data = enrichData(data);
  
  if (unitChart) unitChart.destroy();
  if (gmvChart) gmvChart.destroy();
  if (aspChart) aspChart.destroy();
  
  renderKPIs(data);
  unitChart = makeChart(document.getElementById('unitDrrChart'), data, 'unit_drr', 'Unit DRR', '#6366f1', false);
  gmvChart = makeChart(document.getElementById('gmvDrrChart'), data, 'gmv_drr', 'GMV DRR', '#f59e0b', true);
  aspChart = makeAspChart(document.getElementById('aspChart'), data);
  renderTable(data);
}

// Controls logic
document.getElementById('levelSelect').addEventListener('change', function() {
  const level = this.value;
  const fg = document.getElementById('filterGroup');
  const fs = document.getElementById('filterSelect');
  const fl = document.getElementById('filterLabel');
  
  if (level === 'overall') {
    fg.style.display = 'none';
  } else {
    fg.style.display = 'flex';
    fs.innerHTML = '';
    let options = [];
    if (level === 'brand') { options = DATA.topBrands; fl.textContent = 'Brand'; }
    else if (level === 'articleType') { options = DATA.topArticleTypes; fl.textContent = 'Article Type'; }
    else if (level === 'combo') { options = DATA.topCombos; fl.textContent = 'Brand × Article Type'; }
    options.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      fs.appendChild(opt);
    });
  }
  updateDashboard();
});

document.getElementById('filterSelect').addEventListener('change', updateDashboard);

// Initial render
updateDashboard();
</script>
